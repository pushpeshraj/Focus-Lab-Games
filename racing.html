<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Math Racing Game</title>

<style>

body{
margin:0;
background: linear-gradient(to bottom, #4facfe, #00f2fe);
font-family:sans-serif;
color:white;
text-align:center;
}

#topbar{
margin-top:10px;
}








#game{
position:relative;
width:300px;
height:500px;
margin:20px auto;
overflow:hidden;
border:4px solid white;

/* road color */
background: linear-gradient(to bottom, #2c2c2c, #1a1a1a);
}

/* road */
.line{
position:absolute;
width:6px;
height:80px;
background:white;
left:50%;
transform:translateX(-50%);
}

/* car */
#car{
position:absolute;
bottom:20px;
width:50px;
height:80px;
left:125px;
background: linear-gradient(180deg, #ff4d4d, #b30000);
border-radius:12px;
box-shadow: 
0 6px 12px rgba(0,0,0,0.5),
inset 0 3px 6px rgba(255,255,255,0.3);
}

#car::before{
content:"";
position:absolute;
top:10px;
left:10px;
width:30px;
height:25px;
background: rgba(255,255,255,0.6);
border-radius:5px;
}

#car::after{
content:"";
position:absolute;
bottom:-5px;
left:5px;
width:40px;
height:10px;
background:black;
border-radius:5px;
}

/* answers */
.answer{
position:absolute;
width:60px;
height:60px;
background:#4CAF50;
display:flex;
align-items:center;
justify-content:center;
border-radius:10px;
font-size:18px;
font-weight:bold;
}

/* bottom score panel */
#bottomPanel{
margin-top:10px;
font-size:18px;
}

#result{
font-size:22px;
margin-top:10px;
color:yellow;
}

</style>
</head>

<body>

<div id="topbar">
<h3 id="timer">Time: 120</h3>
<h3 id="question">Loading...</h3>
</div>

<div id="game">


<div class="line" style="top:0px"></div>
<div class="line" style="top:100px"></div>
<div class="line" style="top:200px"></div>
<div class="line" style="top:300px"></div>
<div class="line" style="top:400px"></div>

<div id="car"></div>

</div>

<div id="bottomPanel">
<div id="score">Score: 0</div>
<div id="result"></div>
</div>

<script src="racing.js"></script>

</body>
</html>
