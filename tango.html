<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tango Logic Puzzle</title>
    <style>
        :root { --bg: #f8f9fa; --cell: 60px; --border: #333; }
        body { font-family: system-ui, sans-serif; text-align: center; background: var(--bg); margin: 0; padding: 20px; }
        #game-container { position: relative; margin: 20px auto; width: fit-content; }
        #grid { 
            display: grid; 
            grid-template-columns: repeat(6, var(--cell)); 
            border: 2px solid var(--border);
            background: white;
        }
        .cell {
            width: var(--cell); height: var(--cell);
            border: 0.5px solid #ddd;
            display: flex; align-items: center; justify-content: center;
            font-size: 30px; cursor: pointer; user-select: none;
        }
        /* Relation Markers */
        .rel-h, .rel-v {
            position: absolute; font-weight: bold; font-size: 18px;
            color: #666; pointer-events: none; background: white;
            display: flex; align-items: center; justify-content: center;
        }
        .rel-h { width: 20px; height: 20px; transform: translateX(-10px); }
        .rel-v { width: 20px; height: 20px; transform: translateY(-10px); }
        
        #status { margin: 15px; font-weight: bold; min-height: 24px; }
        button { padding: 10px 20px; border-radius: 5px; border: none; background: #2d3436; color: white; cursor: pointer; }
    </style>
</head>
<body>
    <h2>☀️ Tango Puzzle 🌙</h2>
    <div id="status"></div>
    <div id="game-container">
        <div id="grid"></div>
    </div>
    <button onclick="initGame()">New Game</button>
    <script src="tango.js"></script>
</body>
</html>
