<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Queens Puzzle - Pixel Perfect</title>
    <style>
        :root {
            --bg-color: #b8d3ee;
            --text-color: #2d3436;
            --border-color: #333;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            background-color: var(--bg-color); 
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        /* wrapper forces the grid to stay a clean size */
        #game-wrapper {
            width: 90vw;
            max-width: 480px; 
            aspect-ratio: 1 / 1;
            position: relative;
            /* Outline prevents the outer border from adding to the width/height calculation */
            outline: 2px solid var(--border-color);
        }

        #grid { 
            display: grid; 
            width: 100%;
            height: 100%;
            background-color: white;
            user-select: none;
            touch-action: none;
        }

        .cell {
            display: flex; 
            align-items: center; 
            justify-content: center; 
            cursor: pointer;
            font-size: 6vw;
            /* Box-shadow creates an internal border that doesn't "double up" on the right/bottom edge */
            box-shadow: 0 0 0 0.5px var(--border-color);
        }

        @media (min-width: 480px) { .cell { font-size: 32px; } }

        #timer { font-size: 1.2rem; font-weight: bold; margin-bottom: 8px; }
        #result { height: 25px; margin: 10px; font-weight: 600; color: #e17055; }

        button { 
            padding: 12px 30px; 
            font-size: 1rem;
            font-weight: bold;
            border-radius: 8px;
            border: none;
            background: #2d3436;
            color: white;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h2>👑 Queens Puzzle</h2>
    <div id="timer">Time: 0s</div>

    <div id="game-wrapper">
        <div id="grid"></div>
    </div>

    <div id="result"></div>
    <button onclick="startGame()">New Game</button>

    <script>
        // Ensure this matches your queens.js grid generation
        const gridSize = 8; 
        const grid = document.getElementById('grid');
        grid.style.gridTemplateColumns = `repeat(${gridSize}, 1fr)`;
        grid.style.gridTemplateRows = `repeat(${gridSize}, 1fr)`;

        // For testing the UI without your js file:
        function setupTestGrid() {
            grid.innerHTML = '';
            for(let i=0; i<gridSize*gridSize; i++) {
                const c = document.createElement('div');
                c.className = 'cell';
                grid.appendChild(c);
            }
        }
        setupTestGrid();
    </script>
    <script src="queens.js"></script>

</body>
</html>
