<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Queens Game - Fixed Mobile</title>
<style>
:root {
    --bg-color: #b8d3ee;
    --text-color: #2d3436;
    --cell-size: 60px;
}

/* Mobile Fix: Force grid to fill width and remove gaps */
@media (max-width: 600px) {
    :root {
        --cell-size: 11.5vw; /* Scales based on screen width */
    }
    #grid {
        width: 95vw !important; /* Forces the grid to stay within phone bounds */
        gap: 0 !important;      /* Removes any accidental spacing */
    }
    .cell {
        font-size: 6vw !important; /* Scales the Queen icon */
    }
}

body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    text-align: center;
    background-color: var(--bg-color);
    margin: 0;
    padding: 10px;
    /* Fixes tap delays and accidental zooming */
    touch-action: manipulation; 
}

#grid {
    display: grid;
    margin: 15px auto;
    width: fit-content;
    border: 2px solid #333;
    background: white;
    /* Use border-collapse logic */
    column-gap: 0;
    row-gap: 0;
}

.cell {
    width: var(--cell-size);
    height: var(--cell-size);
    max-width: 70px; /* Prevents cells from getting too huge on tablets */
    max-height: 70px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    cursor: pointer;
    /* Use box-shadow for internal borders to prevent "white gaps" */
    box-shadow: inset 0 0 0 0.5px rgba(0,0,0,0.2);
    border: none; 
    box-sizing: border-box;
}

#timer { font-size: 1.2rem; margin-bottom: 5px; }
#result { font-weight: 600; margin: 10px; height: 25px; color: #e17055; }

button {
    padding: 14px 28px;
    cursor: pointer;
    border-radius: 8px;
    border: none;
    background: #2d3436;
    color: white;
    font-weight: bold;
    font-size: 1rem;
}
</style>
</head>
<body>
    <h2>👑 Queens Puzzle</h2>
    <div id="timer">Time: 0s</div>
    <div id="grid"></div>
    <div id="result"></div>
    <button onclick="startGame()">New Game</button>
    <script src="queens.js"></script>
</body>
</html>
