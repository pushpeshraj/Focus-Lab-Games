<!DOCTYPE html>
<html>
<head>
<title>Tic Tac Toe</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
</head>

<body>

<h1>Tic Tac Toe</h1>

<div id="board">

<button onclick="move(this,0)"></button>
<button onclick="move(this,1)"></button>
<button onclick="move(this,2)"></button>

<button onclick="move(this,3)"></button>
<button onclick="move(this,4)"></button>
<button onclick="move(this,5)"></button>

<button onclick="move(this,6)"></button>
<button onclick="move(this,7)"></button>
<button onclick="move(this,8)"></button>

</div>

<h2 id="result"></h2>

<button onclick="resetGame()">Restart</button>

<script src="tictactoe.js"></script>

</body>
</html>
