<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>9x9 Sudoku - Bold Borders</title>
    <style>
        :root { 
            --cell: 45px; 
            --accent: #0077b5; 
            --selected: #d1e9ff;
            --outer-border: 3px solid #000;
            --inner-border: 1px solid #999;
        }
        body { font-family: sans-serif; text-align: center; background: #f0f2f5; margin: 0; padding: 20px; }
        
        #grid { 
            display: grid; 
            grid-template-columns: repeat(9, var(--cell)); 
            margin: 20px auto; 
            width: fit-content; 
            border: var(--outer-border);
            background: #000; /* Acts as the thickest border line */
            gap: 0px;
        }
        .cell {
            width: var(--cell); height: var(--cell);
            background: white;
            display: flex; align-items: center; justify-content: center; 
            font-size: 20px; border: 0.5px solid #ccc;
            box-sizing: border-box; cursor: pointer;
        }

        /* Bold 3x3 Block Borders */
        .cell:nth-child(3n) { border-right: 2px solid #000; }
        .cell:nth-child(9n) { border-right: none; } /* Remove right border on far right */
        .cell:nth-child(n+19):nth-child(-n+27), 
        .cell:nth-child(n+46):nth-child(-n+54) { border-bottom: 2px solid #000; }

        .cell.selected { background-color: var(--selected); outline: 3px solid var(--accent); z-index: 5; }
        .cell.fixed { background: #f2f2f2; font-weight: bold; color: #000; }
        .cell.user-val { color: var(--accent); font-weight: 500; }

        #number-pad { display: flex; justify-content: center; gap: 8px; margin-top: 25px; flex-wrap: wrap; }
        .num-btn {
            width: 50px; height: 50px; border: 2px solid #333;
            display: flex; align-items: center; justify-content: center;
            font-size: 22px; font-weight: bold; background: white;
            cursor: pointer; border-radius: 8px; transition: 0.1s;
        }
        .num-btn:hover { background: #eee; }
        .num-btn:active { background: var(--accent); color: white; transform: scale(0.9); }
        .num-btn.clear { width: auto; padding: 0 20px; background: #ff4d4d; color: white; border: none; }

        #status { margin: 15px; font-weight: bold; color: #2ecc71; height: 24px; font-size: 1.2rem; }
        button.main-btn { padding: 12px 25px; margin-top: 20px; cursor: pointer; border-radius: 5px; border: none; background: #333; color: white; font-size: 1rem; }
    </style>
</head>
<body>
    <h2>9x9 Sudoku</h2>
    <div id="grid"></div>
    
    <div id="number-pad">
        <div class="num-btn" onclick="inputNumber(1)">1</div>
        <div class="num-btn" onclick="inputNumber(2)">2</div>
        <div class="num-btn" onclick="inputNumber(3)">3</div>
        <div class="num-btn" onclick="inputNumber(4)">4</div>
        <div class="num-btn" onclick="inputNumber(5)">5</div>
        <div class="num-btn" onclick="inputNumber(6)">6</div>
        <div class="num-btn" onclick="inputNumber(7)">7</div>
        <div class="num-btn" onclick="inputNumber(8)">8</div>
        <div class="num-btn" onclick="inputNumber(9)">9</div>
        <div class="num-btn clear" onclick="inputNumber(0)">ERASE</div>
    </div>

    <div id="status"></div>
    <button class="main-btn" onclick="initGame()">Generate New Puzzle</button>

    <script src="sudoku.js"></script>
</body>
</html>
