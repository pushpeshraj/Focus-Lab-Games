<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Expert Binary Island (7x7)</title>
    <style>
        :root { --cell: 50px; --island: #2d3436; --water: #0984e3; --border: #333; }
        body { font-family: sans-serif; text-align: center; background: #f5f6fa; margin: 0; padding: 20px; }
        #grid { 
            display: grid; grid-template-columns: repeat(7, var(--cell)); 
            margin: 20px auto; width: fit-content; border: 3px solid var(--border); background: white;
        }
        .cell {
            width: var(--cell); height: var(--cell); border: 1px solid #dfe6e9;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; font-weight: bold; cursor: pointer; user-select: none;
        }
        .cell.is-island { background: var(--island); color: white; border-color: #000; }
        .cell.is-water { position: relative; }
        .cell.is-water::after { 
            content: ""; width: 12px; height: 12px; background: var(--water); border-radius: 50%; 
        }
        #status { margin: 15px; font-weight: bold; min-height: 40px; max-width: 400px; margin-left: auto; margin-right: auto; }
        button { padding: 12px 24px; cursor: pointer; border-radius: 6px; border: none; background: #333; color: white; font-size: 16px; }
        button:hover { background: #000; }
    </style>
</head>
<body>
    <h2>🏝️ Expert Binary Island (7x7)</h2>
    <div id="grid"></div>
    <div id="status">Rules: 1. Islands = Number Size. 2. Islands cannot touch. 3. Water must connect. 4. No 2x2 water pools.</div>
    <button onclick="initGame()">Generate Expert Puzzle</button>
    <script src="island.js"></script>
</body>
</html>
